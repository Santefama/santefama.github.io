<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <div>Apunta la cámara al alimento</div>
  <div id="label-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/ROkL4EX0F/";
    let model, maxPredictions;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();
      window.requestAnimationFrame(loop);
    }

    async function loop() {
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(document.getElementById("webcam"));
      let best = prediction[0];
      for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > best.probability) {
          best = prediction[i];
        }
      }
      if (best.probability > 0.8) {
        AppInventor.setWebViewString(best.className);
      }
      document.getElementById("label-container").innerHTML = best.className + ": " + Math.round(best.probability * 100) + "%";
    }

    const constraints = { video: { facingMode: "environment" } };
    navigator.mediaDevices.getUserMedia(constraints).then(stream => {
      const webcam = document.createElement("video");
      webcam.id = "webcam";
      webcam.srcObject = stream;
      webcam.autoplay = true;
      webcam.style.width = "100%";
      document.body.prepend(webcam);
      init();
    });
  </script>
</body>
</html>
