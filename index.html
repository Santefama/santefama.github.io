<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; }
    video { width: 100vw; height: auto; display: block; }
    #label-container { font-size: 20px; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline muted></video>
  <div id="label-container">Cargando modelo...</div>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/7I6q39qXq/";
    let model;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      document.getElementById("label-container").innerHTML = "Apunta la cámara al alimento";
      loop();
    }

    async function loop() {
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const webcam = document.getElementById("webcam");
      if (!webcam || webcam.readyState < 2) return;
      const prediction = await model.predict(webcam);
      let best = prediction[0];
      for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > best.probability) best = prediction[i];
      }
      if (best.probability > 0.8) {
        AppInventor.setWebViewString(best.className);
      }
      document.getElementById("label-container").innerHTML = best.className + ": " + Math.round(best.probability * 100) + "%";
    }

    const constraints = { video: { facingMode: "environment" }, audio: false };
    navigator.mediaDevices.getUserMedia(constraints).then(stream => {
      const webcam = document.getElementById("webcam");
      webcam.srcObject = stream;
      webcam.onloadedmetadata = () => {
        webcam.play();
        init();
      };
    }).catch(err => {
      document.getElementById("label-container").innerHTML = "Error cámara: " + err.message;
    });
  </script>
</body>
</html>
